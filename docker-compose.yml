services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erpsmart_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - erpsmart

  nginx:
    image: nginx:1.27-alpine
    container_name: erpsmart_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - erpsmart

  mysql:
    image: mysql:8.0
    container_name: erpsmart_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: erpsmart
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: erpsmart
      MYSQL_PASSWORD: erpsmart
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - erpsmart

  redis:
    image: redis:7-alpine
    container_name: erpsmart_redis
    ports:
      - "6379:6379"
    networks:
      - erpsmart

  node:
    image: node:20-alpine
    container_name: erpsmart_node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    command: sh -c "npm run dev -- --host 0.0.0.0"
    networks:
      - erpsmart

networks:
  erpsmart:
    driver: bridge

volumes:
  mysql_data:
